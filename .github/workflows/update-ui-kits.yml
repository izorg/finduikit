name: "Update UI Kits"

on:
  schedule:
    - cron: "0 4 * * *"

  workflow_dispatch: null

jobs:
  update-ui-kits:
    runs-on: ubuntu-latest

    env:
      BRANCH: update-ui-kits

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: "yarn"
          cache-dependency-path: "yarn.lock"
          node-version-file: ".nvmrc"

      - name: Install
        env:
          HUSKY: 0
        run: yarn install --immutable

      - name: Run update task
        run: yarn update-ui-kits
        env:
          CHECK_COUNT: 200
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "fix: update UI kits"
          git push --force origin "$BRANCH"

      - name: Create or update Pull Request with GitHub CLI
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TITLE="fix: update UI kits ($(date +'%Y-%m-%d'))"
          PR_NUMBER="$(gh pr list \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [[ -n "$PR_NUMBER" ]]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE"
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated daily update triggered by the **Daily UI Kits Update** workflow."
          fi
